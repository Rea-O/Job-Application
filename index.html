<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application | Rea's Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 0;
        }
        .form-container {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px;
        }
        fieldset {
            border: 2px solid #764ba2 !important;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        legend {
            float: none;
            width: auto;
            padding: 0 15px;
            color: #764ba2;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .btn-primary {
            background-color: #764ba2;
            border: none;
        }
        .btn-primary:hover {
            background-color: #5a397a;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 form-container">
            <h2 class="text-center mb-4" style="color: #4a4a4a;">Career Opportunities</h2>
            <hr>
            
            <form id="jobForm" onsubmit="return validateForm()">
                
                <fieldset>
                    <legend>Personal Information</legend>
                    <div class="mb-3">
                        <label for="fullname" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullname" name="fullname">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="telephone" class="form-label">Telephone Number</label>
                            <input type="tel" class="form-control" id="telephone" name="telephone">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Physical Address</label>
                        <textarea class="form-control" id="address" rows="2"></textarea>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Position Information</legend>
                    <div class="mb-3">
                        <label class="form-label">Desired Job Title</label>
                        <select class="form-select" id="jobTitle">
                            <option value="">Choose a position...</option>
                            <option>Software Engineer</option>
                            <option>System Analyst</option>
                            <option>Database Administrator</option>
                        </select>
                    </div>
                    <label class="form-label d-block">Employment Type</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="empType" id="ptc" value="Part-time contract">
                        <label class="form-check-label" for="ptc">Part-time contract</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="empType" id="ftp" value="Full-time permanent">
                        <label class="form-check-label" for="ftp">Full-time permanent</label>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Area(s) of Interest</legend>
                    <div class="row">
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input interest-check" type="checkbox" value="Account Executive">
                                <label class="form-check-label">Account Executive</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input interest-check" type="checkbox" value="Business Development">
                                <label class="form-check-label">Business Development</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input interest-check" type="checkbox" value="Sales Manager">
                                <label class="form-check-label">Sales Manager</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input interest-check" type="checkbox" value="VP Sales">
                                <label class="form-check-label">VP Sales</label>
                            </div>
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Final Details</legend>
                    <div class="mb-3">
                        <label class="form-label">Willing to relocate?</label><br>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="relocate" id="relocYes" value="Yes">
                            <label class="form-check-label" for="relocYes">Yes</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="relocate" id="relocNo" value="No">
                            <label class="form-check-label" for="relocNo">No</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Why are you suitable for this role?</label>
                        <textarea class="form-control" id="message" rows="3" placeholder="Describe your experience..."></textarea>
                    </div>
                </fieldset>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <button type="reset" class="btn btn-secondary me-md-2">Reset</button>
                    <button type="submit" class="btn btn-primary px-5">Submit Application</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function validateForm() {
    let name = document.getElementById("fullname").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("telephone").value;
    
    // Checkbox validation
    let checkboxes = document.querySelectorAll('.interest-check:checked');
    
    if (name === "" || email === "" || phone === "") {
        alert("Wait! Please complete the Name, Email, and Telephone fields.");
        return false;
    }
    
    if (checkboxes.length === 0) {
        alert("Please select at least one Area of Interest.");
        return false;
    }

    alert("Success! Your application has been submitted.");
    return true;
}
</script>

</body>
</html>
